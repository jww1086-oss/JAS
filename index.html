<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSHA | 안전 점검 시스템</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Signature Pad Lib -->
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <div class="mobile-frame">
            <!-- Header -->
            <header class="doing-header">
                <div class="logo">
                     <span class="logo-main">KOSHA</span>
                     <p class="logo-sub">안전보건공단</p>
                </div>
                <div id="current-date" class="header-date"></div>
            </header>

            <!-- Main Content -->
            <main id="app">
            
            <!-- Progress Tracker (Active during inspection) -->
            <div id="stepper" class="stepper-container" style="display: none;">
                <div class="step-progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="step-nodes">
                    <div class="step-node active" data-step="1"><span>1</span><label>작업</label></div>
                    <div class="step-node" data-step="2"><span>2</span><label>위험</label></div>
                    <div class="step-node" data-step="3"><span>3</span><label>사진</label></div>
                    <div class="step-node" data-step="4"><span>4</span><label>서명</label></div>
                </div>
            </div>

            <!-- Dashboard Section -->
            <section id="dashboard" class="phase active">
                <!-- Visual Banner -->
                <div class="main-banner">
                    <img src="https://images.unsplash.com/photo-1542382257-80dedb725088?auto=format&fit=crop&q=80&w=600" alt="Power Plant">
                    <div class="banner-overlay">
                        <h2>안전모 미착용자!<br>사다리 작업금지!</h2>
                    </div>
                </div>
                
                <!-- Doing Grid Menu -->
                <div class="doing-grid">
                    <div class="grid-card" onclick="startAssessment()">
                        <div class="icon-box color-pink">
                            <i data-lucide="clipboard-check"></i>
                        </div>
                        <span>위험성평가</span>
                    </div>
                    <div class="grid-card">
                        <div class="icon-box color-blue">
                            <i data-lucide="construction"></i>
                        </div>
                        <span>산업안전<br>보건법령</span>
                    </div>
                    <div class="grid-card">
                        <div class="icon-box color-cyan">
                            <i data-lucide="clock"></i>
                        </div>
                        <span>작업<br>중지권</span>
                    </div>
                    <div class="grid-card">
                        <div class="icon-box color-purple">
                            <i data-lucide="users"></i>
                        </div>
                        <span>종사자<br>의견</span>
                    </div>
                    <div class="grid-card">
                        <div class="icon-box color-orange">
                            <i data-lucide="search"></i>
                        </div>
                        <span>아차<br>사고</span>
                    </div>
                    <div class="grid-card">
                        <div class="icon-box color-pink-light">
                            <i data-lucide="git-branch"></i>
                        </div>
                        <span>비상대응<br>매뉴얼</span>
                    </div>
                    <div class="grid-card">
                        <div class="icon-box color-blue-light">
                            <i data-lucide="folder"></i>
                        </div>
                        <span>SOP<br>표준작업절차</span>
                    </div>
                    <div class="grid-card">
                        <div class="icon-box color-green">
                            <i data-lucide="monitor"></i>
                        </div>
                        <span>정기안전<br>보건교육</span>
                    </div>
                    <div class="grid-card">
                        <div class="icon-box color-teal">
                            <i data-lucide="book"></i>
                        </div>
                        <span>법정<br>교육</span>
                    </div>
                </div>
            </section>

            <!-- Phase 1: User & Task Selection -->
            <section id="step-1" class="phase">
                <div class="section-header">
                    <h2>근로자 및 작업 선택</h2>
                    <p>본인 이름과 오늘 수행할 작업을 입력하세요.</p>
                </div>
                <div class="form-group ui-group dropdown-container">
                    <label class="ui-label">근로자 이름</label>
                    <input type="text" id="worker-input" class="ui-input" placeholder="이름을 입력하거나 선택하세요" autocomplete="off">
                    <div id="worker-dropdown" class="custom-dropdown"></div>
                </div>
                <!-- User Info Removed -->
                <div class="form-group ui-group dropdown-container">
                    <label class="ui-label">부서명</label>
                    <input type="text" id="task-select" class="ui-input" placeholder="부서명을 선택하거나 입력하세요" autocomplete="off">
                    <div id="dept-dropdown" class="custom-dropdown"></div>
                </div>
                <div class="btn-container adaptive">
                    <button class="btn btn-primary main-action-btn" onclick="nextStep(2)">위험성평가 실시 <i data-lucide="play"></i></button>
                    <button class="btn btn-secondary" onclick="goHome()">취소 및 홈으로</button>
                </div>
            </section>

            <!-- Phase 2: Risk Checklist -->
            <section id="step-2" class="phase">
                <div class="section-header">
                    <h2>위험 요인 및 대책 확인</h2>
                </div>
                <!-- Dynamic Task Selection -->
                <div class="form-group ui-group dropdown-container" id="task-selection-area">
                    <label class="ui-label">작업명 선택</label>
                    <input type="text" id="step2-task-select" class="ui-input" placeholder="작업명을 선택하거나 입력하세요" autocomplete="off">
                    <div id="step2-task-dropdown" class="custom-dropdown"></div>
                </div>
                <!-- NEW: Dynamic Work Step Selection -->
                <div class="form-group ui-group dropdown-container" id="step-selection-area">
                    <label class="ui-label">작업단계 선택</label>
                    <input type="text" id="step2-step-select" class="ui-input" placeholder="작업단계를 선택하거나 입력하세요" autocomplete="off">
                    <div id="step2-step-dropdown" class="custom-dropdown"></div>
                </div>
                <div class="checklist" id="risk-checklist"></div>

                <!-- Incident Reference Card (Conditional) -->
                <div id="incident-container" class="incident-card" style="display: none;">
                    <div class="incident-header">
                        <i data-lucide="alert-triangle"></i>
                        <span>유사 사고 사례 (Incident Case)</span>
                    </div>
                    <div class="incident-content" id="incident-content">
                        <!-- Loaded dynamically -->
                    </div>
                </div>

                <div id="next-action-container"></div>
                <div class="btn-container">
                    <button class="btn btn-secondary" onclick="prevStep(1)">이전</button>
                </div>
            </section>

            <!-- Phase 3: Photo Upload -->
            <section id="step-3" class="phase">
                <div class="section-header">
                    <h2>현장 사진 촬영</h2>
                </div>
                <div class="photo-upload-container">
                    <div id="photo-preview" class="photo-upload-area" onclick="document.getElementById('photo-input').click()" style="cursor: pointer;">
                        <i data-lucide="camera" class="placeholder-icon" style="pointer-events: none;"></i>
                        <p style="pointer-events: none;">현장 사진 촬영하기 (여기를 터치)</p>
                    </div>
                    <input type="file" id="photo-input" accept="image/*" capture="environment" style="display: none;">
                    <button class="btn btn-secondary" onclick="document.getElementById('photo-input').click()" style="margin-top: 10px;">사진 교체하기</button>
                </div>
                <div class="btn-container">
                    <button class="btn btn-primary" onclick="nextStep(4)">다음 단계 <i data-lucide="arrow-right"></i></button>
                    <button class="btn btn-secondary" onclick="prevStep(2)">이전</button>
                </div>
            </section>

            <!-- Phase 4: Digital Signature -->
            <section id="step-4" class="phase">
                <div class="section-header">
                    <h2>디지털 서명</h2>
                </div>
                <div class="signature-container">
                    <canvas id="signature-pad"></canvas>
                    <button class="btn btn-secondary btn-sm" id="clear-signature">지우기</button>
                </div>
                <div class="btn-container">
                    <button class="btn btn-primary btn-finish" id="submit-btn" onclick="submitLog()">결과 제출</button>
                    <button class="btn btn-secondary" onclick="prevStep(3)">이전</button>
                </div>
            </section>
            </main>

            <!-- Bottom Navigation -->
            <nav class="bottom-nav">
                <div class="nav-item active" onclick="goHome()">
                    <i data-lucide="home"></i>
                    <span>홈</span>
                </div>
                <div class="nav-item">
                    <i data-lucide="phone"></i>
                    <span>연락처</span>
                </div>
                <div class="nav-item">
                    <i data-lucide="user"></i>
                    <span>MY</span>
                </div>
                <div class="nav-item">
                    <i data-lucide="search"></i>
                    <span>검색</span>
                </div>
                <div class="nav-item">
                    <i data-lucide="more-horizontal"></i>
                    <span>전체</span>
                </div>
            </nav>

        </div> <!-- .mobile-frame -->
    </div> <!-- .app-shell -->

    <!-- Global Elements -->
    <div id="toast"></div>
    <div id="loading-overlay" class="overlay">
        <div class="loader"></div>
    </div>

    <script src="app.js"></script>

</body>
</html>
